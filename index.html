<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicToPDF - Fast & Secure Image to PDF</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg-primary: #0B001A;
            --bg-secondary: #160133;
            --text-primary: #FFFFFF;
            --text-secondary: #A394B8;
            --accent-neon: #39FF14;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de brilho de fundo (Background Glow) */
        body::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(57,255,20,0.05) 0%, rgba(22,1,51,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Estilo Glassmorphism / Cyber-Minimalism */
        .glass-card {
            background-color: rgba(22, 1, 51, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(163, 148, 184, 0.2);
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Input de arquivo customizado */
        .file-upload-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        .file-upload-wrapper input[type="file"] {
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-display {
            border: 1px dashed rgba(163, 148, 184, 0.4);
            border-radius: 8px;
            padding: 20px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .file-upload-wrapper:hover .file-upload-display {
            border-color: var(--accent-neon);
            color: var(--text-primary);
        }

        /* Botão Principal Cyberpunk */
        .btn-neon {
            background-color: transparent;
            color: var(--accent-neon);
            border: 1px solid var(--accent-neon);
            padding: 14px 28px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.1);
        }

        .btn-neon:hover:not(:disabled) {
            background-color: var(--accent-neon);
            color: var(--bg-primary);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.6), 0 0 40px rgba(57, 255, 20, 0.2);
        }

        .btn-neon:disabled {
            border-color: #555;
            color: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            font-size: 0.9rem;
            min-height: 20px;
            font-weight: 500;
        }

        /* Seção de Doação */
        .donation-section {
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid rgba(163, 148, 184, 0.2);
            padding-top: 20px;
        }

        .donation-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .btn-coffee {
            background-color: #1e0245;
            color: var(--text-primary);
            border: 1px solid rgba(163, 148, 184, 0.3);
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-coffee:hover {
            background-color: #2a045e;
            border-color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <h1>PicToPDF</h1>
            <p class="subtitle">Secure, local-only processing.<br>Transform your images into structured documents instantly.</p>
            
            <div class="file-upload-wrapper">
                <div class="file-upload-display" id="fileDisplay">
                    Click to select JPG / PNG files<br><span style="font-size: 0.8rem; opacity: 0.7;">(Or drag and drop here)</span>
                </div>
                <input type="file" id="fileInput" accept="image/png, image/jpeg, image/jpg" multiple onchange="updateFileName()">
            </div>

            <button id="convertBtn" class="btn-neon" onclick="gerarPDF()">Compile PDF</button>
            <div id="status"></div>

            <div class="donation-section">
                <p class="donation-text">Essa ferramenta te ajudou a salvar tempo?<br>Considere apoiar o projeto open-source!</p>
                <a href="https://ko-fi.com/seulink" target="_blank" class="btn-coffee">
                    ☕ Me pague um café
                </a>
            </div>
        </div>
    </div>

    <script>
        // Atualiza a interface quando arquivos são selecionados
        function updateFileName() {
            const input = document.getElementById('fileInput');
            const display = document.getElementById('fileDisplay');
            if (input.files.length > 0) {
                display.style.borderColor = 'var(--accent-neon)';
                display.style.color = 'var(--text-primary)';
                display.innerHTML = `${input.files.length} file(s) selected Ready to process.`;
            } else {
                display.style.borderColor = 'rgba(163, 148, 184, 0.4)';
                display.style.color = 'var(--text-secondary)';
                display.innerHTML = `Click to select JPG / PNG files<br><span style="font-size: 0.8rem; opacity: 0.7;">(Or drag and drop here)</span>`;
            }
        }

        async function gerarPDF() {
            const fileInput = document.getElementById('fileInput');
            const statusText = document.getElementById('status');
            const btn = document.getElementById('convertBtn');
            const files = fileInput.files;

            if (files.length === 0) {
                statusText.style.color = "#ff3333";
                statusText.innerText = "[ERROR] No images selected.";
                return;
            }

            btn.disabled = true;
            statusText.style.color = "var(--text-secondary)";
            statusText.innerText = "System processing... please wait.";

            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = pdf.internal.pageSize.getHeight();

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const imgData = await lerArquivo(file);
                    
                    if (i > 0) pdf.addPage();

                    const imgProps = pdf.getImageProperties(imgData);
                    const ratio = imgProps.width / imgProps.height;
                    
                    let calcWidth = pdfWidth;
                    let calcHeight = pdfWidth / ratio;

                    if (calcHeight > pdfHeight) {
                        calcHeight = pdfHeight;
                        calcWidth = pdfHeight * ratio;
                    }

                    const x = (pdfWidth - calcWidth) / 2;
                    const y = (pdfHeight - calcHeight) / 2;
                    const format = file.type === 'image/png' ? 'PNG' : 'JPEG';
                    
                    pdf.addImage(imgData, format, x, y, calcWidth, calcHeight);
                }

                pdf.save('PicToPDF_Document.pdf');
                
                statusText.style.color = "var(--accent-neon)";
                statusText.innerText = "[SUCCESS] Download initialized.";
            } catch (error) {
                console.error(error);
                statusText.style.color = "#ff3333";
                statusText.innerText = "[ERROR] Compilation failed.";
            } finally {
                btn.disabled = false;
            }
        }

        function lerArquivo(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(new Error("Failed to read file"));
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
